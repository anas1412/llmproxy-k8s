apiVersion: v1
kind: ServiceAccount
metadata:
  name: llmproxy-operator
  namespace: llmproxy-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llmproxy-operator
rules:
  - apiGroups: [llmproxy.llmproxy.io]
    resources: [proxykeys]
    verbs: [get, list, watch]
  - apiGroups: [llmproxy.llmproxy.io]
    resources: [proxykeys/status]
    verbs: [get, patch, update]
  - apiGroups: ['']
    resources: [secrets]
    verbs: [get, create, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: llmproxy-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: llmproxy-operator
subjects:
  - kind: ServiceAccount
    name: llmproxy-operator
    namespace: llmproxy-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: llmproxy-operator
  namespace: llmproxy-system
rules:
  - apiGroups: [llmproxy.llmproxy.io]
    resources: [channels]
    verbs: [get, list, watch]
  - apiGroups: [llmproxy.llmproxy.io]
    resources: [channels/status]
    verbs: [get, patch, update]
  - apiGroups: [llmproxy.llmproxy.io]
    resources: [groups]
    verbs: [get, list, watch]
  - apiGroups: [llmproxy.llmproxy.io]
    resources: [groups/status]
    verbs: [get, patch, update]
  - apiGroups: ['']
    resources: [secrets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: llmproxy-operator
  namespace: llmproxy-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: llmproxy-operator
subjects:
  - kind: ServiceAccount
    name: llmproxy-operator
    namespace: llmproxy-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmproxy
  namespace: llmproxy-system
spec:
  replicas: 1
  selector:
    matchLabels: { app: llmproxy }
  template:
    metadata:
      labels: { app: llmproxy }
    spec:
      serviceAccountName: llmproxy-operator
      containers:
        - name: llmproxy
          image: ghcr.io/YOURORG/llmproxy-operator:latest
          env:
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef: { fieldPath: metadata.namespace }
            - name: PROXY_URL
              value: http://llmproxy.llmproxy-system.svc.cluster.local:8000
            - name: ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: llmproxy-admin
                  key: adminKey
                  optional: true
          ports:
            - { containerPort: 8000, name: proxy }
            - { containerPort: 8081, name: health }
          readinessProbe:
            httpGet: { path: /readyz, port: health }
          livenessProbe:
            httpGet: { path: /healthz, port: health }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: llmproxy
  namespace: llmproxy-system
spec:
  selector: { app: llmproxy }
  ports:
    - { name: proxy, port: 8000, targetPort: proxy }
    - { name: health, port: 8081, targetPort: health }
