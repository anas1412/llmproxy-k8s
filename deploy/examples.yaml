# 1. Provider API key — operator namespace only
apiVersion: v1
kind: Secret
metadata:
  name: openai-real-key
  namespace: llmproxy-system
stringData:
  apiKey: sk-REPLACE_ME
---
# 2. Channel CR — references the provider secret
apiVersion: llmproxy.llmproxy.io/v1alpha1
kind: Channel
metadata:
  name: openai
  namespace: llmproxy-system
spec:
  type: openai
  baseURL: https://api.openai.com
  keySecretRef: { name: openai-real-key }
  priority: 10
  status: Enabled
  models: [gpt-4o, gpt-4o-mini, gpt-4-turbo]
---
# 3. Anthropic example
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-real-key
  namespace: llmproxy-system
stringData:
  apiKey: sk-ant-REPLACE_ME
---
apiVersion: llmproxy.llmproxy.io/v1alpha1
kind: Channel
metadata:
  name: anthropic
  namespace: llmproxy-system
spec:
  type: anthropic
  baseURL: https://api.anthropic.com
  keySecretRef: { name: anthropic-real-key }
  priority: 20
  status: Enabled
  models: [claude-sonnet-4-6, claude-haiku-4-5]
---
# 4. Group — tenant definition (operator namespace)
apiVersion: llmproxy.llmproxy.io/v1alpha1
kind: Group
metadata:
  name: my-team
  namespace: llmproxy-system
spec:
  status: Enabled
  channelRefs: [openai, anthropic]
  rpmRatio: 1.0
  tpmRatio: 1.0
---
# 5. Tenant ProxyKey — operator creates Secret "my-app-llmproxy" in ns "my-team"
apiVersion: llmproxy.llmproxy.io/v1alpha1
kind: ProxyKey
metadata:
  name: my-app
  namespace: my-team
spec:
  groupRef: my-team
  status: Enabled
  models: [gpt-4o-mini]
  quota: 100
  periodQuota: 50
  periodType: monthly
  subnets: [10.0.0.0/8]
---
# 6. ProxyKey for Anthropic via same group — creates Secret "my-app-claude-llmproxy" in ns "my-team"
apiVersion: llmproxy.llmproxy.io/v1alpha1
kind: ProxyKey
metadata:
  name: my-app-claude
  namespace: my-team
spec:
  groupRef: my-team
  status: Enabled
  models: [claude-haiku-4-5]
